apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
# Attaches the ghcr-pull pull secret to the default service account so that
# all pods in the apps namespace can pull from ghcr.io without needing to
# declare imagePullSecrets explicitly in every Deployment.
imagePullSecrets:
  - name: ghcr-pull
