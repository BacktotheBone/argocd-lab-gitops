apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-git-generator
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: https://github.com/BacktotheBone/argocd-lab-apps.git
        revision: HEAD
        directories:
          - path: app-git-examples/*
  template:
    metadata:
      name: 'app-git-{{ .path.basename }}-example'
    spec:
      project: 'default'
      source:
        repoURL: https://github.com/BacktotheBone/argocd-lab-apps.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        managedNamespaceMetadata:
          labels:
            argocd.argoproj.io/managed-by: argocd
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true